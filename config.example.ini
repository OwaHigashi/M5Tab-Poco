# M5Tab-Poco config — copy to microSD as /config.ini
# Lines starting with # or ; are comments. Unknown keys are preserved.
#
# The device ALWAYS joins an upstream WiFi as a Station. There is no AP
# fallback — if the SSID/pass below are wrong, the screen will show
# "WiFi NOT connected" and keep retrying.

# ---- WiFi (station mode) ----
wifi_ssid = YOUR_SSID
wifi_pass = YOUR_PASS

# ---- Network ----
hostname         = m5tab-poco
http_port        = 80
wifi_timeout_ms  = 10000      ; how long setup() waits for association before moving on

# ---- Static IP (optional) ----
# If ip_address is set, DHCP is bypassed and the below values are applied.
# Leave ip_address blank (or delete the line) to use DHCP.
# Tip: the STA MAC is written to /mac.txt on every boot — use it if you
# prefer reserving the address in your router's DHCP table instead.
# ip_address = 192.168.1.50
# netmask    = 255.255.255.0
# gateway    = 192.168.1.1
# dns1       = 192.168.1.1
# dns2       = 8.8.8.8

# ---- Audio / behaviour ----
startup_volume   = 180        ; 0..255
accept_on_boot   = true       ; true/false, 1/0, on/off, yes/no
debounce_ms      = 300        ; minimum interval between FX triggers

# ---- Display ----
rotation   = 1                ; 0..3 (1 = landscape 1280x720, try 3 if upside-down)
brightness = 255              ; 0..255

# ---- Marquee (scrolling text) ----
# VLW font on microSD (NOT TTF — M5GFX's loadFont only reads VLW, which is
# the Processing PFont format). If the file is missing on SD, the built-in
# bitmap efontJA_24_b is used as fallback.
# scale is applied to whichever font wins. With the 40px VLW below, scale 2
# gives ≈80px-tall text. Shrink to 1 for smaller / speed, raise for bigger.
marquee_font  = /fonts/ipaexg40.vlw   ; try: ipaexg24/28/40 (Gothic), ipaexm* (Mincho)
marquee_scale = 2

# ---- Reserved for future extensions ----
# bomb_sound_url = https://example.com/bomb.wav
# clap_sound_url = https://example.com/clap.wav
# ntp_server     = pool.ntp.org
# timezone       = JST-9
